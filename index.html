<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Galaxia – Del Palacio S.A.</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F5F5F5;color:#212121;font-size:14px}
.topbar{background:#4C3BAF;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:16px;font-weight:bold}
.topbar-sub{font-size:11px;opacity:.75;margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.topbar select,.topbar input{font-size:12px;padding:4px 8px;border-radius:4px;border:none;background:rgba(255,255,255,.2);color:#fff}
.topbar select option{color:#212121;background:#fff}
.nav{background:#fff;border-bottom:1px solid #E0E0E0;display:flex;overflow-x:auto;padding:0 16px;position:sticky;top:54px;z-index:99}
.nav-tab{padding:12px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#757575;border-bottom:3px solid transparent;white-space:nowrap;font-family:Arial,sans-serif}
.nav-tab.active{color:#4C3BAF;border-bottom-color:#4C3BAF;font-weight:bold}
.main{padding:20px 24px;max-width:1200px;margin:0 auto}
.view{display:none}.view.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpi-n{font-size:28px;font-weight:bold}
.kpi-l{font-size:11px;color:#757575;margin-top:4px}
.kpi-pct{font-size:12px;font-weight:bold;margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px}
.card-title{font-size:13px;font-weight:bold;color:#424242;margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em}
.block-pill{border-radius:8px;padding:12px 16px;cursor:pointer;margin-bottom:10px;transition:transform .1s}
.block-pill:hover{transform:translateX(3px)}
.block-name{font-size:13px;font-weight:bold;margin-bottom:8px}
.block-stats{display:flex;gap:16px}
.bs{text-align:center}
.bs-n{font-size:18px;font-weight:bold}
.bs-l{font-size:10px;opacity:.7;margin-top:1px}
.prog{height:5px;background:rgba(0,0,0,.12);border-radius:3px;margin-top:10px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;transition:width .4s}
.prog-lbl{font-size:10px;text-align:right;margin-top:3px;opacity:.65}
.venc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0F0F0;font-size:12px}
.venc-row:last-child{border-bottom:none}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:bold}
.b-pend{background:#F5F5F5;color:#757575}
.b-curso{background:#E3F2FD;color:#1565C0}
.b-comp{background:#E8F5E9;color:#2E7D32}
.b-bloq{background:#FFEBEE;color:#C62828}
.b-alta{background:#FFEBEE;color:#C62828}
.b-media{background:#FFF8E1;color:#E65100}
.b-baja{background:#E8F5E9;color:#2E7D32}
.section-hdr{font-size:11px;font-weight:bold;color:#9E9E9E;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.field label{font-size:12px;color:#757575;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid #E0E0E0;border-radius:6px;font-family:Arial,sans-serif;background:#fff}
.field textarea{min-height:64px;resize:vertical}
.btn{padding:9px 20px;font-size:13px;border-radius:6px;cursor:pointer;font-family:Arial,sans-serif;border:none;font-weight:bold}
.btn-primary{background:#4C3BAF;color:#fff}.btn-primary:hover{background:#3C3489}
.btn-sm{padding:3px 9px;font-size:11px;border-radius:4px;cursor:pointer;border:1px solid #E0E0E0;background:#F5F5F5;color:#424242;font-family:Arial,sans-serif}
.btn-danger{border-color:#FFCDD2;color:#C62828}
.pda-row{padding:12px 0;border-bottom:1px solid #F5F5F5}
.pda-row:last-child{border-bottom:none}
.pda-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.pda-title{font-size:13px;font-weight:bold;color:#212121}
.pda-accion{font-size:12px;color:#616161;margin-top:3px}
.pda-meta{display:flex;gap:14px;margin-top:6px;font-size:11px;color:#9E9E9E;flex-wrap:wrap}
.empty{text-align:center;padding:32px;color:#9E9E9E;font-size:13px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters select{font-size:12px;padding:5px 8px;border:1px solid #E0E0E0;border-radius:6px}
.spinner{text-align:center;padding:32px;color:#9E9E9E;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:#4C3BAF;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:bold;opacity:0;transition:opacity .3s;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.save-btn-row{display:flex;align-items:center;gap:12px;margin-top:4px}
@media(max-width:700px){
  .grid2,.grid3,.form-row,.form-row3{grid-template-columns:1fr}
  .main{padding:12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">📊 Dashboard Galaxia</div>
    <div class="topbar-sub">Del Palacio S.A. – Planes de acción por bloque del manual</div>
  </div>
  <div class="topbar-right">
    <span style="font-size:11px;opacity:.7">👤 Cargando como:</span>
    <select id="current-user">
      <option value="">Seleccioná tu nombre</option>
      <option>Martina Jorge</option>
      <option value="__new__">+ Agregar persona...</option>
    </select>
    <input id="new-user-inp" type="text" placeholder="Nombre" style="display:none;width:130px">
    <button class="btn-sm" id="add-user-btn" style="display:none;background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.3)">✓</button>
  </div>
</div>

<div class="nav" id="main-nav">
  <button class="nav-tab active" onclick="showView('overview')">🏠 Resumen</button>
  <button class="nav-tab" onclick="showView('ventas')">📈 1. Ventas</button>
  <button class="nav-tab" onclick="showView('trade')">📍 2. Trade</button>
  <button class="nav-tab" onclick="showView('bees')">📱 3. BEES</button>
  <button class="nav-tab" onclick="showView('capex')">📦 4. CAPEX</button>
  <button class="nav-tab" onclick="showView('gente')">👥 5. Gente</button>
  <button class="nav-tab" onclick="showView('todos')">📋 Todos</button>
</div>

<div class="main">

  <!-- OVERVIEW -->
  <div class="view active" id="view-overview">
    <div class="kpi-grid" id="ov-kpis"><div class="spinner">Cargando datos...</div></div>
    <div class="grid2">
      <div>
        <div class="section-hdr">Avance por bloque</div>
        <div id="ov-blocks"></div>
      </div>
      <div>
        <div class="section-hdr">Próximos vencimientos</div>
        <div class="card" id="ov-venc" style="padding:12px 16px"></div>
        <div class="section-hdr">Estado general</div>
        <div class="card" style="padding:16px">
          <div style="position:relative;height:200px">
            <canvas id="chart-estado" role="img" aria-label="Planes por estado"></canvas>
          </div>
        </div>
      </div>
    </div>
    <div class="section-hdr">Planes por bloque Galaxia</div>
    <div class="card" style="padding:16px">
      <div style="position:relative;height:230px">
        <canvas id="chart-bloques" role="img" aria-label="Planes por bloque"></canvas>
      </div>
    </div>
  </div>

  <!-- BLOQUES -->
  <div class="view" id="view-ventas"></div>
  <div class="view" id="view-trade"></div>
  <div class="view" id="view-bees"></div>
  <div class="view" id="view-capex"></div>
  <div class="view" id="view-gente"></div>

  <!-- TODOS -->
  <div class="view" id="view-todos">
    <div class="filters">
      <select id="fil-bloque" onchange="renderTodos()"><option value="">Todos los bloques</option><option>1. Ventas</option><option>2. Trade Marketing</option><option>3. BEES</option><option>4. CAPEX</option><option>5. Gente</option></select>
      <select id="fil-estado" onchange="renderTodos()"><option value="">Todos los estados</option><option>Pendiente</option><option>En curso</option><option>Completado</option><option>Bloqueado</option></select>
      <select id="fil-prio" onchange="renderTodos()"><option value="">Todas las prioridades</option><option>Alta</option><option>Media</option><option>Baja</option></select>
      <select id="fil-resp" onchange="renderTodos()"><option value="">Todos</option></select>
    </div>
    <div id="todos-lista"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
// Pegá acá la URL de tu Web App de Apps Script después de publicarla
const API_URL = 'https://script.google.com/macros/s/AKfycbyUw_kcEUOpyChsvvH1SljWeCIl6TGQPLPgTy7Xip6zwn0zTPFFAUp9RxFZGaaTpWaqAw/exec';

const BLOQUES = {
  '1. Ventas':         { color:'#534AB7', bg:'#EEEDFE', view:'ventas',
    puntos:['1.1 Cobertura de clientes','1.2 Efectividad de visitas','1.3 Volumen y mix de productos','1.4 Clientes nuevos','1.5 Gestión de cartera / deudas','1.6 Cumplimiento de ruta DPO','1.7 Reportes y seguimiento'] },
  '2. Trade Marketing':{ color:'#2E7D32', bg:'#E8F5E9', view:'trade',
    puntos:['2.1 Foto de éxito / estándar de ejecución','2.2 POP externo','2.3 POP interno','2.4 Exhibición adicional','2.5 Precio en góndola correcto','2.6 Heladera / frío','2.7 Relevamiento de mercado'] },
  '3. BEES':           { color:'#E65100', bg:'#FFF3E0', view:'bees',
    puntos:['3.1 NR BEES (Net Revenue Digital)','3.2 % clientes digitalizados','3.3 Compradores activos en BEES','3.4 Rewards – adhesión','3.5 Uso de ofertas de puntos','3.6 Canjes de puntos','3.7 BEES Force – sincronización','3.8 BEES Force – tareas por pilar','3.9 BEES Force – KPIs productividad','3.10 BEES Academy','3.11 BEES Vision'] },
  '4. CAPEX':          { color:'#6A1B9A', bg:'#F3E5F5', view:'capex',
    puntos:['4.1 Registro y control de activos','4.2 Recepción de coolers','4.3 Instalación de coolers','4.4 Retiro de activos','4.5 Stock en depósito','4.6 Colocación de activos','4.7 Mantenimiento y estado'] },
  '5. Gente':          { color:'#C62828', bg:'#FFEBEE', view:'gente',
    puntos:['5.1 Estructura / nómina actualizada','5.2 Políticas salariales','5.3 Evaluación de desempeño 180°','5.4 OPR','5.5 Encuesta de clima','5.6 Plan Anual de Capacitaciones','5.7 Inducción de nuevos colaboradores','5.8 Paquete de beneficios','5.9 Retención y fidelización'] }
};
const BNAMES = Object.keys(BLOQUES);
const BADGE_E = {Pendiente:'b-pend','En curso':'b-curso',Completado:'b-comp',Bloqueado:'b-bloq'};
const BADGE_P = {Alta:'b-alta',Media:'b-media',Baja:'b-baja'};

let plans = [], users = ['Martina Jorge'], currentUser = '';
let chartEstado=null, chartBloques=null;
const blockCharts = {};

// ── API calls ────────────────────────────────────────────────
async function apiGet(action){
  const r = await fetch(`${API_URL}?action=${action}`);
  return r.json();
}
async function apiPost(body){
  const r = await fetch(API_URL, {method:'POST', body:JSON.stringify(body)});
  return r.json();
}

// ── Toast ────────────────────────────────────────────────────
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── User management ──────────────────────────────────────────
function buildUserSelects(){
  const sel=document.getElementById('current-user');
  const cur=sel.value;
  sel.innerHTML='<option value="">Seleccioná tu nombre</option>';
  users.forEach(u=>{const o=document.createElement('option');o.value=u;o.textContent=u;sel.appendChild(o);});
  const add=document.createElement('option');add.value='__new__';add.textContent='+ Agregar persona...';sel.appendChild(add);
  if(cur&&cur!=='__new__') sel.value=cur;
  const fr=document.getElementById('fil-resp');
  if(fr){fr.innerHTML='<option value="">Todos</option>';users.forEach(u=>{const o=document.createElement('option');o.value=u;o.textContent=u;fr.appendChild(o);});}
}
document.getElementById('current-user').addEventListener('change',function(){
  if(this.value==='__new__'){
    document.getElementById('new-user-inp').style.display='inline-block';
    document.getElementById('add-user-btn').style.display='inline-block';
    this.value='';
  } else { currentUser=this.value; }
});
document.getElementById('add-user-btn').addEventListener('click',function(){
  const v=document.getElementById('new-user-inp').value.trim();
  if(!v)return;
  if(!users.includes(v)) users.push(v);
  buildUserSelects();
  document.getElementById('current-user').value=v; currentUser=v;
  document.getElementById('new-user-inp').style.display='none';
  document.getElementById('add-user-btn').style.display='none';
  document.getElementById('new-user-inp').value='';
});

// ── Navigation ───────────────────────────────────────────────
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const tabs={overview:0,ventas:1,trade:2,bees:3,capex:4,gente:5,todos:6};
  document.querySelectorAll('.nav-tab')[tabs[v]].classList.add('active');
  if(v==='overview') renderOverview();
  else if(v==='todos') renderTodos();
  else {
    const bloque=BNAMES.find(b=>BLOQUES[b].view===v);
    if(bloque){ renderBlockKpis(bloque); renderBlockLista(bloque); renderBlockChart(v,bloque); }
  }
}

// ── Stats helpers ────────────────────────────────────────────
function statsFor(bloque){
  const bp=bloque?plans.filter(p=>p.bloque===bloque):plans;
  const comp=bp.filter(p=>p.estado==='Completado').length;
  return {
    total:bp.length, comp,
    curso:bp.filter(p=>p.estado==='En curso').length,
    pend:bp.filter(p=>p.estado==='Pendiente').length,
    bloq:bp.filter(p=>p.estado==='Bloqueado').length,
    pct:bp.length?Math.round(comp/bp.length*100):0
  };
}
function calcVencidos(){
  const today=new Date().toISOString().slice(0,10);
  return plans.filter(p=>p.estado!=='Completado'&&p.fecha&&p.fecha<today).length;
}

// ── OVERVIEW ─────────────────────────────────────────────────
function renderOverview(){
  const s=statsFor(null);
  document.getElementById('ov-kpis').innerHTML=`
    <div class="kpi"><div class="kpi-n" style="color:#534AB7">${s.total}</div><div class="kpi-l">Total PDAs</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#2E7D32">${s.comp}</div><div class="kpi-l">Completados</div><div class="kpi-pct" style="color:#2E7D32">${s.pct}% tasa cierre</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#1565C0">${s.curso}</div><div class="kpi-l">En curso</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#E65100">${s.pend}</div><div class="kpi-l">Pendientes</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#C62828">${s.bloq}</div><div class="kpi-l">Bloqueados</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#C62828">${calcVencidos()}</div><div class="kpi-l">Vencidos abiertos</div></div>
  `;
  document.getElementById('ov-blocks').innerHTML=BNAMES.map(b=>{
    const bs=statsFor(b);const cfg=BLOQUES[b];
    return `<div class="block-pill" style="background:${cfg.bg}" onclick="showView('${cfg.view}')">
      <div class="block-name" style="color:${cfg.color}">${b}</div>
      <div class="block-stats">
        <div class="bs"><div class="bs-n" style="color:${cfg.color}">${bs.total}</div><div class="bs-l" style="color:${cfg.color}">total</div></div>
        <div class="bs"><div class="bs-n" style="color:#2E7D32">${bs.comp}</div><div class="bs-l" style="color:#2E7D32">comp.</div></div>
        <div class="bs"><div class="bs-n" style="color:#1565C0">${bs.curso}</div><div class="bs-l" style="color:#1565C0">curso</div></div>
        <div class="bs"><div class="bs-n" style="color:#C62828">${bs.bloq}</div><div class="bs-l" style="color:#C62828">bloq.</div></div>
      </div>
      <div class="prog"><div class="prog-f" style="width:${bs.pct}%;background:${cfg.color}"></div></div>
      <div class="prog-lbl" style="color:${cfg.color}">${bs.pct}% completado</div>
    </div>`;
  }).join('');

  const today=new Date().toISOString().slice(0,10);
  const prox=plans.filter(p=>p.estado!=='Completado'&&p.fecha&&p.fecha>=today)
    .sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,6);
  document.getElementById('ov-venc').innerHTML=prox.length
    ?prox.map(p=>{
        const dias=Math.round((new Date(p.fecha)-new Date(today))/86400000);
        const col=dias<=3?'#C62828':dias<=7?'#E65100':'#1565C0';
        return `<div class="venc-row">
          <div><div style="font-size:12px;font-weight:bold">${p.brecha.substring(0,42)}${p.brecha.length>42?'…':''}</div>
          <div style="font-size:10px;color:#9E9E9E">${p.bloque} · ${p.responsable}</div></div>
          <span class="badge" style="background:${col}20;color:${col};flex-shrink:0">${dias===0?'Hoy':dias===1?'Mañana':'en '+dias+'d'}</span>
        </div>`;
      }).join('')
    :'<div style="font-size:12px;color:#9E9E9E;padding:8px 0">Sin vencimientos próximos</div>';

  renderChartEstado(s);
  renderChartBloques();
}

function renderChartEstado(s){
  const ctx=document.getElementById('chart-estado');if(!ctx)return;
  if(chartEstado)chartEstado.destroy();
  chartEstado=new Chart(ctx,{type:'bar',
    data:{labels:['Pendiente','En curso','Completado','Bloqueado'],
      datasets:[{label:'Planes',data:[s.pend,s.curso,s.comp,s.bloq],
        backgroundColor:['#9E9E9E40','#1565C040','#2E7D3240','#C6282840'],
        borderColor:['#9E9E9E','#1565C0','#2E7D32','#C62828'],borderWidth:2,borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
}
function renderChartBloques(){
  const ctx=document.getElementById('chart-bloques');if(!ctx)return;
  if(chartBloques)chartBloques.destroy();
  const labels=BNAMES.map(b=>b.replace(/^\d+\. /,''));
  const colors=BNAMES.map(b=>BLOQUES[b].color);
  chartBloques=new Chart(ctx,{type:'bar',
    data:{labels,datasets:[
      {label:'Total',data:BNAMES.map(b=>statsFor(b).total),backgroundColor:colors.map(c=>c+'30'),borderColor:colors,borderWidth:2,borderRadius:4},
      {label:'Completados',data:BNAMES.map(b=>statsFor(b).comp),backgroundColor:colors.map(c=>c+'80'),borderColor:colors,borderWidth:0,borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:11},boxWidth:12,padding:12}}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});
}

// ── BLOCK VIEWS ──────────────────────────────────────────────
function buildBlockViews(){
  BNAMES.forEach(bloque=>{
    const cfg=BLOQUES[bloque];
    document.getElementById('view-'+cfg.view).innerHTML=`
      <div class="kpi-grid" id="${cfg.view}-kpis"></div>
      <div class="grid2">
        <div>
          <div class="section-hdr">Cargar nuevo plan de acción</div>
          <div class="card">
            <div class="form-row">
              <div class="field" style="grid-column:1/-1">
                <label>Punto del manual</label>
                <select id="${cfg.view}-punto">${cfg.puntos.map(p=>`<option>${p}</option>`).join('')}</select>
              </div>
            </div>
            <div class="field" style="margin-bottom:10px">
              <label>Brecha / Problema detectado</label>
              <textarea id="${cfg.view}-brecha" placeholder="¿Qué está fallando o qué KPI está bajo? Describí la situación actual."></textarea>
            </div>
            <div class="field" style="margin-bottom:10px">
              <label>Acción a tomar</label>
              <textarea id="${cfg.view}-accion" placeholder="¿Qué vas a hacer para corregirlo? Sé específico/a."></textarea>
            </div>
            <div class="form-row">
              <div class="field"><label>Responsable</label><input id="${cfg.view}-resp" type="text" placeholder="Nombre"></div>
              <div class="field"><label>Fecha compromiso</label><input id="${cfg.view}-fecha" type="date"></div>
            </div>
            <div class="form-row">
              <div class="field"><label>Prioridad</label><select id="${cfg.view}-prio"><option>Alta</option><option selected>Media</option><option>Baja</option></select></div>
              <div class="field"><label>Meta / Indicador de éxito</label><input id="${cfg.view}-meta" type="text" placeholder="Ej: NR BEES > 95%"></div>
            </div>
            <div class="field" style="margin-bottom:14px">
              <label>Observaciones</label>
              <textarea id="${cfg.view}-obs" placeholder="Contexto adicional, recursos necesarios..." style="min-height:48px"></textarea>
            </div>
            <div class="save-btn-row">
              <button class="btn btn-primary" onclick="guardar('${bloque}')">💾 Guardar plan</button>
              <span id="${cfg.view}-saving" style="font-size:12px;color:#9E9E9E;display:none">Guardando...</span>
            </div>
          </div>
        </div>
        <div>
          <div class="section-hdr">Avance por punto del manual</div>
          <div class="card" style="padding:16px">
            <div style="position:relative;height:280px">
              <canvas id="chart-${cfg.view}" role="img" aria-label="Avance por punto ${bloque}"></canvas>
            </div>
          </div>
        </div>
      </div>
      <div class="section-hdr">Planes registrados – ${bloque}</div>
      <div id="${cfg.view}-lista"><div class="spinner">Cargando...</div></div>
    `;
  });
}

function renderBlockKpis(bloque){
  const cfg=BLOQUES[bloque];const s=statsFor(bloque);
  const el=document.getElementById(cfg.view+'-kpis');if(!el)return;
  el.innerHTML=`
    <div class="kpi"><div class="kpi-n" style="color:${cfg.color}">${s.total}</div><div class="kpi-l">Total</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#2E7D32">${s.comp}</div><div class="kpi-l">Completados</div><div class="kpi-pct" style="color:#2E7D32">${s.pct}%</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#1565C0">${s.curso}</div><div class="kpi-l">En curso</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#E65100">${s.pend}</div><div class="kpi-l">Pendientes</div></div>
    <div class="kpi"><div class="kpi-n" style="color:#C62828">${s.bloq}</div><div class="kpi-l">Bloqueados</div></div>
  `;
}

function renderBlockLista(bloque){
  const cfg=BLOQUES[bloque];
  const bp=plans.filter(p=>p.bloque===bloque).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  const el=document.getElementById(cfg.view+'-lista');if(!el)return;
  if(!bp.length){el.innerHTML='<div class="empty">📭 Sin planes cargados para este bloque todavía</div>';return;}
  el.innerHTML='<div class="card">'+bp.map(p=>`
    <div class="pda-row">
      <div class="pda-top">
        <div>
          <span class="badge" style="background:${cfg.color}18;color:${cfg.color};margin-right:4px">${p.punto||''}</span>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;align-items:center">
          <span class="badge ${BADGE_P[p.prioridad]||'b-media'}">${p.prioridad}</span>
          <select onchange="cambiarEstado('${p.id}',this.value,'${bloque}')" style="font-size:11px;padding:2px 6px;border:1px solid #E0E0E0;border-radius:4px">
            ${['Pendiente','En curso','Completado','Bloqueado'].map(e=>`<option ${e===p.estado?'selected':''}>${e}</option>`).join('')}
          </select>
          <button class="btn-sm btn-danger" onclick="eliminar('${p.id}','${bloque}')" title="Eliminar">🗑</button>
        </div>
      </div>
      <div class="pda-title">${p.brecha}</div>
      <div class="pda-accion">${p.accion}</div>
      <div class="pda-meta">
        <span>👤 ${p.responsable}</span>
        <span>📅 Compromiso: ${p.fecha||'—'}</span>
        ${p.meta?`<span>🎯 ${p.meta}</span>`:''}
        ${p.obs?`<span>📝 ${p.obs}</span>`:''}
      </div>
    </div>
  `).join('')+'</div>';
}

function renderBlockChart(viewId, bloque){
  const cfg=BLOQUES[bloque];
  const ctx=document.getElementById('chart-'+viewId);if(!ctx)return;
  if(blockCharts[viewId])blockCharts[viewId].destroy();
  const labels=cfg.puntos.map(p=>p.split(' ').slice(0,3).join(' '));
  blockCharts[viewId]=new Chart(ctx,{type:'bar',
    data:{labels,datasets:[
      {label:'Total',data:cfg.puntos.map(p=>plans.filter(pl=>pl.bloque===bloque&&pl.punto===p).length),backgroundColor:cfg.color+'25',borderColor:cfg.color,borderWidth:2,borderRadius:3},
      {label:'Completados',data:cfg.puntos.map(p=>plans.filter(pl=>pl.bloque===bloque&&pl.punto===p&&pl.estado==='Completado').length),backgroundColor:cfg.color+'70',borderColor:cfg.color,borderWidth:0,borderRadius:3}
    ]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:10},boxWidth:10,padding:8}}},
      scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}}},y:{ticks:{font:{size:10}},grid:{display:false}}}}});
}

// ── CRUD ─────────────────────────────────────────────────────
async function guardar(bloque){
  const cfg=BLOQUES[bloque];const v=cfg.view;
  const punto=document.getElementById(v+'-punto').value;
  const brecha=document.getElementById(v+'-brecha').value.trim();
  const accion=document.getElementById(v+'-accion').value.trim();
  const resp=(document.getElementById(v+'-resp').value.trim())||currentUser;
  const fecha=document.getElementById(v+'-fecha').value;
  const prio=document.getElementById(v+'-prio').value;
  const meta=document.getElementById(v+'-meta').value.trim();
  const obs=document.getElementById(v+'-obs').value.trim();
  if(!brecha||!accion||!resp||!fecha){alert('Completá: brecha, acción, responsable y fecha.');return;}
  const spin=document.getElementById(v+'-saving');spin.style.display='inline';
  try{
    const res=await apiPost({action:'addPlan',plan:{bloque,punto,brecha,accion,responsable:resp,fecha,prioridad:prio,meta,obs,estado:'Pendiente',cargadoPor:currentUser||resp}});
    if(res.ok){
      plans.push({id:res.id,bloque,punto,brecha,accion,responsable:resp,fecha,prioridad:prio,meta,obs,estado:'Pendiente',cargadoPor:currentUser||resp});
      toast('✅ Plan guardado en el Sheets');
      ['brecha','accion','fecha','meta','obs'].forEach(f=>document.getElementById(v+'-'+f).value='');
      renderBlockKpis(bloque);renderBlockLista(bloque);renderBlockChart(v,bloque);
    } else { alert('Error al guardar: '+(res.error||'desconocido')); }
  }catch(e){alert('Error de conexión con el servidor.');}
  spin.style.display='none';
}

async function cambiarEstado(id,estado,bloque){
  try{
    await apiPost({action:'updateEstado',id,estado});
    const p=plans.find(x=>x.id==id);if(p)p.estado=estado;
    renderBlockKpis(bloque);renderBlockLista(bloque);
    if(document.getElementById('view-overview').classList.contains('active'))renderOverview();
    toast('Estado actualizado ✓');
  }catch(e){alert('Error al actualizar.');}
}

async function eliminar(id,bloque){
  if(!confirm('¿Eliminás este plan de acción?'))return;
  try{
    await apiPost({action:'deletePlan',id});
    plans=plans.filter(p=>p.id!=id);
    renderBlockKpis(bloque);renderBlockLista(bloque);
    renderBlockChart(BLOQUES[bloque].view,bloque);
    if(document.getElementById('view-overview').classList.contains('active'))renderOverview();
    toast('Plan eliminado');
  }catch(e){alert('Error al eliminar.');}
}

function renderTodos(){
  const fb=document.getElementById('fil-bloque').value;
  const fe=document.getElementById('fil-estado').value;
  const fp=document.getElementById('fil-prio').value;
  const fr=document.getElementById('fil-resp').value;
  let filtered=plans.filter(p=>(!fb||p.bloque===fb)&&(!fe||p.estado===fe)&&(!fp||p.prioridad===fp)&&(!fr||p.responsable===fr)).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  const el=document.getElementById('todos-lista');
  if(!filtered.length){el.innerHTML='<div class="empty">📭 Sin planes con estos filtros</div>';return;}
  el.innerHTML='<div class="card">'+filtered.map(p=>{
    const cfg=BLOQUES[p.bloque]||{color:'#534AB7'};
    return `<div class="pda-row">
      <div class="pda-top">
        <div>
          <span class="badge" style="background:${cfg.color}18;color:${cfg.color};margin-right:4px">${p.bloque}</span>
          <span style="font-size:10px;color:#9E9E9E">${p.punto||''}</span>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <span class="badge ${BADGE_P[p.prioridad]||'b-media'}">${p.prioridad}</span>
          <span class="badge ${BADGE_E[p.estado]||'b-pend'}">${p.estado}</span>
        </div>
      </div>
      <div class="pda-title">${p.brecha}</div>
      <div class="pda-accion">${p.accion}</div>
      <div class="pda-meta">
        <span>👤 ${p.responsable}</span>
        <span>📅 ${p.fecha||'—'}</span>
        ${p.meta?`<span>🎯 ${p.meta}</span>`:''}
      </div>
    </div>`;
  }).join('')+'</div>';
}

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  buildBlockViews();
  buildUserSelects();
  try{
    const res=await apiGet('getPlanes');
    plans=res.planes||[];
    // collect unique users from plans
    plans.forEach(p=>{ if(p.responsable&&!users.includes(p.responsable))users.push(p.responsable); });
    buildUserSelects();
  }catch(e){
    document.getElementById('ov-kpis').innerHTML='<div style="color:#C62828;padding:1rem;font-size:13px">⚠️ No se pudo conectar con el servidor. Verificá que la URL de Apps Script esté correctamente configurada en el archivo index.html.</div>';
    return;
  }
  renderOverview();
  BNAMES.forEach(b=>{renderBlockKpis(b);renderBlockLista(b);});
}

init();
</script>
</body>
</html>
